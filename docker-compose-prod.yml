version: '3.8'

services:

  # REDIS - Streaming URL Cache
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zetflix-network

  # MYSQL - Movie Catalog Storage
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: content_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zetflix-network

  # ZOOKEEPER - Required by Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zetflix-network

  # KAFKA - Event Streaming
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zetflix-network

  content-service:
    image: ${ECR_REGISTRY:-local}/zetflix-content-service:latest
    container_name: content-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    ports:
      - "8081:8081"
    networks:
      - zetflix-network

  video-service:
    image: ${ECR_REGISTRY:-local}/zetflix-video-service:latest
    container_name: video-service
    depends_on:
      kafka:
        condition: service_healthy
    env_file: .env
    ports:
      - "8082:8082"
    networks:
      - zetflix-network

  encoding-service:
    image: ${ECR_REGISTRY:-local}/zetflix-encoding-service:latest
    container_name: encoding-service
    depends_on:
      kafka:
        condition: service_healthy
    env_file: .env
    ports:
      - "8083:8083"
    networks:
      - zetflix-network

  streaming-service:
    image: ${ECR_REGISTRY:-local}/zetflix-streaming-service:latest
    container_name: streaming-service
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    ports:
      - "8084:8084"
    networks:
      - zetflix-network

  frontend:
    image: ${ECR_REGISTRY:-local}/zetflix-frontend:latest
    container_name: frontend
    depends_on:
      - content-service
      - video-service
      - streaming-service
    ports:
      - "80:80"
    networks:
      - zetflix-network

volumes:
  mysql-data:

networks:
  zetflix-network:
    driver: bridge
