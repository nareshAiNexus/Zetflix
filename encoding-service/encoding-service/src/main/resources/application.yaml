spring:
  application:
    name: encoding-service

kafka:
  bootstrap-servers: localhost:9092
  consumer:
    group-id: encoding-service-group
    auto-offset-reset: earliest
    key-deserializer: org.apache.kafka.common.serialization.StringDeSerializer
    value-deserializer: org.springframework.kafka.support.serializer.JSONDeSerializer
    properties:
      spring:
        json:
          trusted:
            packages: "*"
          use:
            type:
              headers: false
          value:
            default:
              type: com.zetflix.encodingservice.event.VideoUploadedEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JSONSerializer

server:
  port: 8083


# AWS configuration
aws:
  access-key: ${AWS_ACCESS_KEY:your-access-key}
  secret-key: ${AWS_SECRET_KEY:your-secret-key}
  region: ${AWS_REGION:ap-south-1}
  s3:
    bucket-name: ${AWS_BUCKET_NAME: movies}

# FFmpeg Configuration
ffmpeg:
  path: ${FFMPEG_PATH: ffmpeg}

# TEMP directory for encoding
encoding:
  endpoints:
    web:
      explore: 
        inlcude: health, info