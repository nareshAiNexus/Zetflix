server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing - all non-file routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to backend services (adjust upstream names/ports to match your docker-compose service names)
    location /api/v1/movies {
        proxy_pass http://content-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/videos {
        proxy_pass http://video-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/stream {
        proxy_pass http://streaming-service:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
