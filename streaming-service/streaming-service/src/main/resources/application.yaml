spring:
  application:
    name: streaming-service
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    group-id: streaming-service-group
    auto-offset-reset: earliest
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    properties:
        spring:
          json:
            trusted:
              packages: "*"
            use:
              type:
                header: false
              value:
                default:
                  type: com.netflix.encodingservice.event.VideoEncodedEvent
server:
  port: 8084

#AWS 
aws:
  access-key: ${AWS_ACCESS_KEY:your-access-key}
  secret-key: ${AWS_SECRET_KEY:your-secret-key}
  region: ${AWS_REGION:ap-south-1}
  s3:
    bucket-name: ${AWS_BUCKET_NAME: movies}
    # Presigned url expiry time in Minutes (default: 60 Minutes)
    presigned-url-expiry: 60

management:
  endpoints:
    web:
      exposure:
        include: health, info